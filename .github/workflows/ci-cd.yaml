name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: eu-west-1
  ECR_REPOSITORY: devops-challenge
  NODE_VERSION: '18'

jobs:
  # ============================================
  # Job 1: Build and Test
  # ============================================
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        working-directory: ./app
        run: npm ci

      - name: Run linter
        working-directory: ./app
        run: npm run lint --if-present
        continue-on-error: true

      - name: Run tests
        working-directory: ./app
        run: npm test

      - name: Build Docker image
        run: |
          docker build -f docker/Dockerfile -t ${{ env.ECR_REPOSITORY }}:test .

      - name: Test Docker image
        run: |
          docker run -d -p 3000:3000 --name test-container ${{ env.ECR_REPOSITORY }}:test
          sleep 10
          curl -f http://localhost:3000/health || exit 1
          docker stop test-container
          docker rm test-container

  # ============================================
  # Job 2: Push to ECR
  # ============================================
  push-to-ecr:
    name: Push to ECR
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    outputs:
      image_tag: ${{ steps.build.outputs.image_tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        id: build
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # Build image
          docker build -f docker/Dockerfile -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest

          # Push images
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

          # Output image tag
          echo "image_tag=$IMAGE_TAG" >> $GITHUB_OUTPUT
          echo "Image pushed: $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"

  # ============================================
  # Job 3: Deploy to ASG
  # ============================================
  deploy:
    name: Deploy to ASG
    runs-on: ubuntu-latest
    needs: push-to-ecr
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get deployment info
        id: info
        run: |
          # Get ASG name
          ASG_NAME=$(aws autoscaling describe-auto-scaling-groups \
            --query "AutoScalingGroups[?contains(AutoScalingGroupName, 'devops-challenge')].AutoScalingGroupName" \
            --output text | head -1)

          # Get Launch Template ID
          LT_ID=$(aws ec2 describe-launch-templates \
            --query "LaunchTemplates[?contains(LaunchTemplateName, 'devops-challenge')].LaunchTemplateId" \
            --output text | head -1)

          echo "asg_name=$ASG_NAME" >> $GITHUB_OUTPUT
          echo "launch_template_id=$LT_ID" >> $GITHUB_OUTPUT
          echo "ASG: $ASG_NAME"
          echo "Launch Template: $LT_ID"

      - name: Start Instance Refresh
        run: |
          ASG_NAME="${{ steps.info.outputs.asg_name }}"

          if [ -z "$ASG_NAME" ]; then
            echo "Error: ASG not found"
            exit 1
          fi

          echo "Starting instance refresh for ASG: $ASG_NAME"

          # Start instance refresh
          REFRESH_ID=$(aws autoscaling start-instance-refresh \
            --auto-scaling-group-name "$ASG_NAME" \
            --preferences '{"MinHealthyPercentage": 50, "InstanceWarmup": 120}' \
            --query 'InstanceRefreshId' \
            --output text)

          echo "Instance refresh started: $REFRESH_ID"

          # Wait for refresh to complete (max 10 minutes)
          echo "Waiting for instance refresh to complete..."
          for i in {1..20}; do
            STATUS=$(aws autoscaling describe-instance-refreshes \
              --auto-scaling-group-name "$ASG_NAME" \
              --instance-refresh-ids "$REFRESH_ID" \
              --query 'InstanceRefreshes[0].Status' \
              --output text)

            echo "Status: $STATUS (attempt $i/20)"

            if [ "$STATUS" == "Successful" ]; then
              echo "Instance refresh completed successfully!"
              exit 0
            elif [ "$STATUS" == "Failed" ] || [ "$STATUS" == "Cancelled" ]; then
              echo "Instance refresh failed with status: $STATUS"
              exit 1
            fi

            sleep 30
          done

          echo "Timeout waiting for instance refresh"
          exit 1

      - name: Verify deployment
        run: |
          # Get ALB DNS
          ALB_DNS=$(aws elbv2 describe-load-balancers \
            --query "LoadBalancers[?contains(LoadBalancerName, 'devops-challenge')].DNSName" \
            --output text | head -1)

          if [ -z "$ALB_DNS" ]; then
            echo "Warning: ALB not found, skipping health check"
            exit 0
          fi

          echo "Verifying deployment at: http://$ALB_DNS/health"

          # Wait for healthy response
          for i in {1..10}; do
            if curl -sf "http://$ALB_DNS/health" > /dev/null 2>&1; then
              echo "Deployment verified successfully!"
              curl -s "http://$ALB_DNS/health" | jq .
              exit 0
            fi
            echo "Waiting for health check... attempt $i/10"
            sleep 15
          done

          echo "Warning: Health check did not pass, but deployment may still be in progress"
